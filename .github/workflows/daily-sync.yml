name: Daily NotebookLM Sync

on:
  # Run every day at 01:00 UTC = 08:00 AM Vietnam (UTC+7)
  schedule:
    - cron: "0 1 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Query NotebookLM → Push to Website
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: automation/requirements.txt

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r automation/requirements.txt

      # ── 4. Install Playwright browsers (needed by notebooklm-py) ─────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. Restore Google session cookies ─────────────────────────────────────
      #    GOOGLE_COOKIES secret must be the JSON array of cookies exported
      #    from your browser. See automation/SETUP.md for instructions.
      - name: Restore NotebookLM session
        run: |
          mkdir -p ~/.config/notebooklm
          echo '${{ secrets.GOOGLE_COOKIES }}' > ~/.config/notebooklm/cookies.json
          echo "✅ Session cookies restored"

      # ── 6. Run daily sync ─────────────────────────────────────────────────────
      - name: Run daily_sync.py
        env:
          NOTEBOOK_ID:          ${{ secrets.NOTEBOOK_ID }}
          WEBSITE_URL:          ${{ secrets.WEBSITE_URL }}
          CRON_SECRET:          ${{ secrets.CRON_SECRET }}
          GOOGLE_COOKIES:       ${{ secrets.GOOGLE_COOKIES }}
          # Auto-refresh: GITHUB_TOKEN is provided automatically by GitHub Actions
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          # Optional: Telegram alerts (add secrets if you want notifications)
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python automation/daily_sync.py

      # ── 7. Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily sync failed on $(date '+%d/%m/%Y %H:%M UTC')"
          echo "Check the logs above for details."
          # Add Telegram / Slack / email notification here if needed
